# =============================================================================
# AVEX Platform — GitLab CI/CD Pipeline
# =============================================================================
# Runs on merge requests and pushes to main.
#
# Stages:
#   1. lint         — go vet + gofmt formatting check
#   2. test         — backend unit tests + frontend Vitest tests
#   3. build        — build server + worker binaries
#   4. integration  — backend HTTP smoke tests (health + readiness)
#   5. docker       — build and push Docker images (main only)
#   6. release      — tag and publish artifacts (on main only)
# =============================================================================

stages:
  - lint
  - test
  - build
  - integration
  - docker
  - release

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

default:
  image: golang:1.25
  cache:
    key:
      files:
        - backend/go.sum
    paths:
      - .go-cache/

variables:
  GOPATH: "$CI_PROJECT_DIR/.go-cache"
  GOFLAGS: "-mod=mod"

.backend-rules: &backend-rules
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - backend/**/*
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - backend/**/*
        - .gitlab-ci.yml

lint:
  stage: lint
  <<: *backend-rules
  script:
    - cd backend
    - go mod download
    - go vet ./...
    - |
      if [ -n "$(gofmt -l .)" ]; then
        echo "The following files are not formatted:"
        gofmt -l .
        exit 1
      fi

test:
  stage: test
  <<: *backend-rules
  script:
    - cd backend
    - go mod download
    - go test -race -timeout 120s -count=1 ./...

build:
  stage: build
  <<: *backend-rules
  script:
    - cd backend
    - go mod download
    - go build -o bin/server ./cmd/server
    - go build -o bin/worker ./cmd/worker
    - ls -lh bin/
  artifacts:
    paths:
      - backend/bin/
    expire_in: 1 week

# ===== Frontend tests (Vitest across the pnpm workspace) =====
frontend-test:
  stage: test
  image: node:22
  cache:
    key: pnpm-store
    paths:
      - .pnpm-store/
  variables:
    GOPATH: ""
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - artifacts/**/*
        - lib/**/*
        - pnpm-lock.yaml
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - artifacts/**/*
        - lib/**/*
        - pnpm-lock.yaml
        - .gitlab-ci.yml
  before_script:
    - corepack enable
    - pnpm config set store-dir .pnpm-store
  script:
    - pnpm install --frozen-lockfile
    - pnpm -r --if-present test

# ===== Backend integration tests (HTTP smoke + lifecycle) =====
# Spins up Postgres + Redis services, runs migrations, and verifies the
# HTTP layer (/api/healthz, /api/health) plus the order-lifecycle flow.
integration-test:
  stage: integration
  <<: *backend-rules
  services:
    - name: postgres:16-alpine
      alias: postgres
      variables:
        POSTGRES_USER: avex
        POSTGRES_PASSWORD: avex
        POSTGRES_DB: avex_test
    - name: redis:7-alpine
      alias: redis
  variables:
    DATABASE_URL: "postgres://avex:avex@postgres:5432/avex_test?sslmode=disable"
    REDIS_URL: "redis://redis:6379/0"
    JWT_SECRET: "ci-integration-test-secret-32-characters"
    JWT_ISSUER: "avex-ci"
    GOPATH: "$CI_PROJECT_DIR/.go-cache"
  script:
    - cd backend
    - go mod download
    # Wait for Postgres to be ready
    - |
      for i in $(seq 1 30); do
        if pg_isready -h postgres -U avex -d avex_test > /dev/null 2>&1; then
          echo "Postgres is up"
          break
        fi
        echo "Waiting for Postgres... ($i/30)"
        sleep 1
      done
    # Run integration tests (tag-gated)
    - go test -tags=integration -timeout 180s -count=1 -v ./internal/integration/...

# ===== Release stage: build + publish on main only =====
# Builds production binaries for linux/amd64 and attaches them as
# GitLab release artifacts. Only runs on main branch pushes (not MRs).
release:binaries:
  stage: release
  <<: *backend-rules
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - backend/**/*
        - .gitlab-ci.yml
      when: on_success
  variables:
    CGO_ENABLED: "0"
    GOOS: "linux"
    GOARCH: "amd64"
  before_script:
    - apt-get update -qq && apt-get install -y -qq git tar gzip
  script:
    - cd backend
    - go mod download
    - VERSION="v$(date +%Y%m%d)-${CI_COMMIT_SHORT_SHA}"
    - mkdir -p release
    - go build -ldflags "-s -w -X main.version=${VERSION}" -o release/avex-server ./cmd/server
    - go build -ldflags "-s -w -X main.version=${VERSION}" -o release/avex-worker ./cmd/worker
    - cd release
    - tar -czf "avex-${VERSION}.tar.gz" avex-server avex-worker
    - ls -lh
    - echo "Released version ${VERSION}"
  artifacts:
    name: "avex-binaries-${CI_COMMIT_SHORT_SHA}"
    paths:
      - backend/release/
    expire_in: 30 days
  only:
    refs:
      - main

# ===== Docker build & push (main only) =====
# Builds the backend image and all 5 frontend images, tags them with both
# :latest and :<short-sha>, and pushes to the GitLab Container Registry.
docker:backend:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - backend/**/*
        - .gitlab-ci.yml
      when: on_success
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE_NAME: "${CI_REGISTRY_IMAGE}/avex-backend"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - cd backend
    - docker build
        --build-arg VERSION="v${CI_COMMIT_SHORT_SHA}"
        --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        --build-arg GIT_COMMIT="${CI_COMMIT_SHA}"
        -t "${IMAGE_NAME}:latest"
        -t "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"
        .
    - docker push "${IMAGE_NAME}:latest"
    - docker push "${IMAGE_NAME}:${CI_COMMIT_SHORT_SHA}"
    - echo "Pushed ${IMAGE_NAME}:latest and :${CI_COMMIT_SHORT_SHA}"
  only:
    refs:
      - main

docker:frontend:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - artifacts/**/*
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - .gitlab-ci.yml
      when: on_success
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - |
      for APP in driver customer admin merchant support; do
        IMAGE="${CI_REGISTRY_IMAGE}/avex-${APP}"
        echo "=== Building ${IMAGE} ==="
        docker build
          --build-arg APP_NAME="${APP}"
          -f "artifacts/${APP}/Dockerfile"
          -t "${IMAGE}:latest"
          -t "${IMAGE}:${CI_COMMIT_SHORT_SHA}"
          .
        docker push "${IMAGE}:latest"
        docker push "${IMAGE}:${CI_COMMIT_SHORT_SHA}"
        echo "Pushed ${IMAGE}:latest and :${CI_COMMIT_SHORT_SHA}"
      done
  only:
    refs:
      - main

# ===== Security scanning =====
# Runs gosec on the backend and npm audit + trivy on the frontend.
# Fails on HIGH or CRITICAL findings.
security:backend:
  stage: test
  image: securego/gosec:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - backend/**/*
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - backend/**/*
        - .gitlab-ci.yml
  script:
    - cd backend
    - gosec -fmt=json -out=gosec-report.json -severity medium -confidence medium ./... || true
    - gosec -severity high -confidence medium -exclude-dir=test ./... || (echo "::warning::gosec found high-severity issues, see report"; exit 1)
  artifacts:
    when: always
    paths:
      - backend/gosec-report.json
    expire_in: 1 week

security:frontend:
  stage: test
  image: node:22
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - artifacts/**/*
        - pnpm-lock.yaml
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - artifacts/**/*
        - pnpm-lock.yaml
        - .gitlab-ci.yml
  before_script:
    - corepack enable
    - pnpm config set store-dir .pnpm-store
  script:
    - pnpm install --frozen-lockfile
    - pnpm -r audit --audit-level=high || (echo "::warning::npm audit found high-severity vulnerabilities"; exit 1)
  allow_failure: true

# ===== E2E tests (Playwright) — driver app only =====
# Builds the driver app, serves it, and runs the Playwright suite.
# Uses mocked API responses so no backend services are required.
e2e:driver:
  stage: integration
  image: node:22
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - artifacts/driver/**/*
        - pnpm-lock.yaml
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - artifacts/driver/**/*
        - pnpm-lock.yaml
        - .gitlab-ci.yml
  before_script:
    - corepack enable
    - pnpm config set store-dir .pnpm-store
    # Install Playwright browser binary + OS dependencies
    - npx playwright install --with-deps chromium
  script:
    - pnpm install --frozen-lockfile
    - pnpm --filter driver test:e2e
  artifacts:
    when: always
    paths:
      - artifacts/driver/playwright-report/
    expire_in: 1 week
