# =============================================================================
# AVEX Backend — CI/CD Pipeline
# =============================================================================
# Runs on every push to main and on every pull request.
#
# Stages:
#   1. lint    — go vet + golangci-lint (if available)
#   2. test    — all unit tests (707+ tests)
#   3. build   — build server + worker binaries + Docker image
#   4. integration — cross-module integration tests (requires PostgreSQL)
# =============================================================================

name: CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/ci.yml"

jobs:
  # ===== Lint + Vet =====
  lint:
    name: Lint & Vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Go vet
        run: go vet ./...

      - name: Check formatting
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "The following files are not formatted:"
            gofmt -l .
            exit 1
          fi

  # ===== Unit Tests =====
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test -race -timeout 120s -count=1 ./...

      - name: Run unit tests (with integration tag — should skip gracefully)
        run: go test -tags=integration -timeout 120s -count=1 ./internal/integration/...

  # ===== Build =====
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: [lint, test]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Build server
        run: |
          mkdir -p bin
          go build -trimpath -ldflags "-s -w" -o bin/server ./cmd/server

      - name: Build worker
        run: |
          go build -trimpath -ldflags "-s -w" -o bin/worker ./cmd/worker

      - name: Verify binaries exist
        run: |
          ls -lh bin/server bin/worker
          ./bin/server --help 2>&1 || true

  # ===== Docker Build =====
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t avex-backend:ci-test .

      - name: Verify image
        run: docker images avex-backend:ci-test

      - name: Test server starts (smoke test)
        run: |
          docker run -d --name avex-test \
            -e APP_ROLE=server \
            -e DATABASE_URL=postgres://dummy:dummy@localhost:5432/dummy \
            -e REDIS_URL=redis://localhost:6379/0 \
            -e JWT_SECRET="test-secret-at-least-32-characters-long!!" \
            -e JWT_ISSUER="avex" \
            -p 8081:8080 \
            avex-backend:ci-test
          sleep 3
          # The server should fail to start (no DB), but it should at least
          # attempt to start (verifying the binary is valid).
          docker logs avex-test 2>&1 || true
          docker rm -f avex-test || true

  # ===== Integration Tests (with PostgreSQL) =====
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: avex
          POSTGRES_PASSWORD: avex
          POSTGRES_DB: avex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U avex"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://avex:avex@localhost:5432/avex_test?sslmode=disable
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run integration tests
        run: go test -tags=integration -v -timeout 180s -count=1 ./internal/integration/...
