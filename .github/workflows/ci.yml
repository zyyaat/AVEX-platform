# =============================================================================
# AVEX Platform — GitHub Actions CI Mirror
# =============================================================================
# Mirrors the GitLab CI pipeline (.gitlab-ci.yml) so that PRs from the GitHub
# mirror get the same lint / test / build coverage.
#
# Triggers:
#   - push to main
#   - pull_request to main
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "22"
  PNPM_VERSION: "11"

jobs:
  # ===========================================================================
  # Backend: lint + test + build
  # ===========================================================================
  backend-lint:
    name: Backend · Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/go.sum

      - name: go vet
        working-directory: backend
        run: go vet ./...

      - name: gofmt check
        working-directory: backend
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "::error::The following files are not formatted:"
            gofmt -l .
            exit 1
          fi

  backend-test:
    name: Backend · Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Run unit tests (with race detector)
        working-directory: backend
        run: go test -race -timeout 120s -count=1 ./...

  backend-build:
    name: Backend · Build
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Build server + worker
        working-directory: backend
        run: |
          mkdir -p bin
          go build -o bin/server ./cmd/server
          go build -o bin/worker ./cmd/worker
          ls -lh bin/

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: avex-backend-binaries
          path: backend/bin/
          retention-days: 7

  # ===========================================================================
  # Backend: integration tests (with services)
  # ===========================================================================
  backend-integration:
    name: Backend · Integration Tests
    runs-on: ubuntu-latest
    needs: backend-build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: avex
          POSTGRES_PASSWORD: avex
          POSTGRES_DB: avex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U avex -d avex_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: "postgres://avex:avex@localhost:5432/avex_test?sslmode=disable"
      REDIS_URL: "redis://localhost:6379/0"
      JWT_SECRET: "ci-integration-test-secret-32-characters"
      JWT_ISSUER: "avex-ci"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Run integration tests
        working-directory: backend
        run: go test -tags=integration -timeout 180s -count=1 -v ./internal/integration/...

  # ===========================================================================
  # Frontend: Vitest across all apps
  # ===========================================================================
  frontend-test:
    name: Frontend · Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Get pnpm store dir
        id: store
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest across all apps
        run: pnpm -r --if-present test

  # ===========================================================================
  # Security: backend (gosec) + frontend (npm audit)
  # ===========================================================================
  security-backend:
    name: Security · Backend (gosec)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: '-severity high -confidence medium -exclude-dir=test ./...'
        working-directory: backend
        env:
          GOFLAGS: "-mod=mod"

  security-frontend:
    name: Security · Frontend (audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (high+)
        run: pnpm -r audit --audit-level=high
        continue-on-error: true

  # ===========================================================================
  # Docker build (main only) — verify Dockerfiles are valid
  # ===========================================================================
  docker-build:
    name: Docker · Build Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [backend-build, frontend-test]
    strategy:
      matrix:
        include:
          - target: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - target: driver
            context: .
            dockerfile: ./artifacts/driver/Dockerfile
            args: APP_NAME=driver
          - target: customer
            context: .
            dockerfile: ./artifacts/customer/Dockerfile
            args: APP_NAME=customer
          - target: admin
            context: .
            dockerfile: ./artifacts/admin/Dockerfile
            args: APP_NAME=admin
          - target: merchant
            context: .
            dockerfile: ./artifacts/merchant/Dockerfile
            args: APP_NAME=merchant
          - target: support
            context: .
            dockerfile: ./artifacts/support/Dockerfile
            args: APP_NAME=support
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.target }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: avex-${{ matrix.target }}:ci
          build-args: ${{ matrix.args }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
